<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dungeon Crawler</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      #hud {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
        z-index: 10;
      }

      #health-bar {
        width: 200px;
        height: 20px;
        background: #333;
        border: 2px solid #666;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }

      #health-fill {
        width: 100%;
        height: 100%;
        background: #2ecc71;
        transition: width 0.3s ease;
      }

      #fps-counter {
        position: absolute;
        top: 8px;
        right: 10px;
        color: #aaa;
        font-family: monospace;
        font-size: 12px;
        pointer-events: none;
        z-index: 10;
      }

      #health-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-family: monospace;
        font-size: 12px;
        text-shadow: 1px 1px 2px #000;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="fps-counter">-- FPS</div>
    <div id="hud">
      <div id="health-bar">
        <div id="health-fill"></div>
        <span id="health-text">100/100</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
